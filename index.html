<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wordbook Dual Train Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            line-height: 1.4;
        }
        button, a, input, select, .tappable {
            touch-action: manipulation;
            cursor: pointer;
        }
        button:active, .tappable:active {
            opacity: 0.6;
            transform: scale(0.97);
        }
        .blur-fix { filter: blur(8px); }
        
        /* 辞書用のA-Zサイドバーを画面右端に固定するスタイル */
        .index-sidebar {
            position: fixed;
            right: 2px;
            top: 140px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 24px;
            z-index: 150;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 8px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" style="padding-bottom: calc(100px + var(--sab));">

    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-[100]" style="padding-top: var(--sat); padding-bottom: 12px;">
        <div class="max-w-md mx-auto text-center pt-4">
            <h1 id="headerTitle" class="text-lg font-bold">マイ単語帳 🚀</h1>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 relative">
        
        <div id="azSidebar" class="index-sidebar hidden">
            </div>
        
        <div id="sectionWordbook">
            <div class="bg-white rounded-xl p-3 shadow-sm border border-slate-100 mb-4">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">システムモード</label>
                <select id="modeSelect" onchange="changeMode()" class="w-full bg-slate-100 px-2.5 py-2 rounded-lg font-bold text-slate-700 border-none text-sm focus:ring-2 focus:ring-indigo-500">
                    <option value="normal">🔒 通常モード</option>
                    <option value="ebbinghaus">🧠 忘却曲線(3日後)</option>
                </select>
            </div>
            
            <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-4">
                <div class="flex flex-col gap-3">
                    <div class="flex gap-2">
                        <input type="text" id="wordInput" placeholder="英単語" class="w-1/2 px-3 py-3 text-base rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 appearance-none">
                        <input type="text" id="meaningInput" placeholder="意味" class="w-1/2 px-3 py-3 text-base rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 appearance-none">
                    </div>
                    <button onclick="addWord()" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-sm active:bg-indigo-700">
                        単語帳に追加する
                    </button>
                </div>
            </div>

            <div class="bg-slate-200 p-1 rounded-xl flex mb-4">
                <button id="tabLearning" onclick="switchTab('learning')" class="w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all bg-white text-slate-800 shadow-sm">
                    未習得 (<span id="countLearning">0</span>)
                </button>
                <button id="tabMastered" onclick="switchTab('mastered')" class="w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all text-slate-500 bg-transparent">
                    習得済み 🎉 (<span id="countMastered">0</span>)
                </button>
            </div>
        </div>

        <div id="sectionDictionary" class="hidden pr-6"> <div class="bg-amber-50 border border-amber-200 text-amber-800 rounded-xl p-3 text-xs mb-4 text-center font-medium">
                📖 ABC順 辞書モード (右端の文字でジャンプ)
            </div>
        </div>

        <div id="wordList" class="space-y-3 pb-12 pr-6"></div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl z-[200]" style="padding-bottom: var(--sab);">
        <div class="max-w-md mx-auto flex justify-around items-center py-3">
            <button onclick="switchMainMode('wordbook')" id="navWordbook" class="flex flex-col items-center gap-1 text-indigo-600 w-1/2 py-1">
                <span class="text-2xl">🚀</span>
                <span class="text-[10px] font-bold">単語帳</span>
            </button>
            <button onclick="switchMainMode('dictionary')" id="navDictionary" class="flex flex-col items-center gap-1 text-slate-400 w-1/2 py-1">
                <span class="text-2xl">📖</span>
                <span class="text-[10px] font-bold">ABC辞書</span>
            </button>
        </div>
    </nav>

    <script>
        const STORAGE_KEY = 'myWordbookTrainV1';
        let words = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentTab = 'learning';
        let mainMode = 'wordbook';
        let currentMode = 'normal';

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(words)); }

        // A-Zサイドバーの自動生成
        function initSidebar() {
            const sidebar = document.getElementById('azSidebar');
            sidebar.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.className = "text-[9px] font-bold text-slate-400 hover:text-indigo-600 block w-full text-center py-0.5";
                btn.innerText = letter;
                btn.onclick = () => scrollToLetter(letter);
                sidebar.appendChild(btn);
            }
        }

        // 指定したアルファベットの場所へスクロール
        function scrollToLetter(letter) {
            const target = document.getElementById(`heading-${letter.toLowerCase()}`);
            if (target) {
                // ヘッダーに被らないように位置を調整してスクロール
                const headerOffset = 70;
                const elementPosition = target.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }
        }

        function switchMainMode(mode) {
            mainMode = mode;
            document.getElementById('sectionWordbook').classList.toggle('hidden', mode !== 'wordbook');
            document.getElementById('sectionDictionary').classList.toggle('hidden', mode !== 'dictionary');
            document.getElementById('azSidebar').classList.toggle('hidden', mode !== 'dictionary');
            
            document.getElementById('navWordbook').classList.toggle('text-indigo-600', mode === 'wordbook');
            document.getElementById('navWordbook').classList.toggle('text-slate-400', mode !== 'wordbook');
            document.getElementById('navDictionary').classList.toggle('text-indigo-600', mode === 'dictionary');
            document.getElementById('navDictionary').classList.toggle('text-slate-400', mode !== 'dictionary');
            
            document.getElementById('headerTitle').innerText = mode === 'wordbook' ? "マイ単語帳 🚀" : "ABC順 辞書モード 📖";
            renderWords();
        }

        function renderWords() {
            const listElement = document.getElementById('wordList');
            const learningWords = words.filter(w => w.status === 'learning');
            const masteredWords = words.filter(w => w.status === 'mastered');
            
            document.getElementById('countLearning').innerText = learningWords.length;
            document.getElementById('countMastered').innerText = masteredWords.length;

            listElement.innerHTML = '';
            let displayWords = [];

            if (mainMode === 'wordbook') {
                displayWords = currentTab === 'learning' ? learningWords : masteredWords;
            } else {
                displayWords = [...words].sort((a, b) => a.word.toLowerCase().localeCompare(b.word.toLowerCase()));
            }

            if (displayWords.length === 0) {
                listElement.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">データがありません</div>`;
                return;
            }

            let lastLetter = "";

            displayWords.forEach((item) => {
                const originalIndex = words.findIndex(w => w.word === item.word && w.meaning === item.meaning);
                
                // 【新機能】辞書モードの時、アルファベットの区切り見出し（A, B, C...）を入れる
                if (mainMode === 'dictionary') {
                    const firstLetter = item.word.charAt(0).toLowerCase();
                    if (firstLetter !== lastLetter && /[a-z]/.test(firstLetter)) {
                        lastLetter = firstLetter;
                        const heading = document.createElement('div');
                        heading.id = `heading-${firstLetter}`;
                        heading.className = "text-xs font-bold text-indigo-600 pt-2 pb-1 border-b border-indigo-100 uppercase tracking-wider";
                        heading.innerText = firstLetter;
                        listElement.appendChild(heading);
                    }
                }

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl p-4 shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 tappable";
                
                // 右手親指用ボタン配置
                let actionBtn = "";
                if (mainMode === 'wordbook') {
                    actionBtn = item.status === 'learning' 
                        ? `<button onclick="updateStatus(${originalIndex}, 'mastered')" class="bg-emerald-50 text-emerald-600 font-bold py-3 px-4 rounded-xl text-xs whitespace-nowrap min-w-[70px]">✓ 覚えた</button>`
                        : `<button onclick="updateStatus(${originalIndex}, 'learning')" class="bg-slate-100 text-slate-600 font-medium py-2 px-3 text-[10px] rounded-lg whitespace-nowrap">戻す</button>`;
                } else {
                    actionBtn = `<span class="text-[9px] font-bold px-2 py-1 rounded whitespace-nowrap ${item.status === 'learning' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'}">${item.status === 'learning' ? '未習得' : '習得済'}</span>`;
                }

                // 💡 【左右を反転】左側に単語・意味のエリア、右側に「覚えた」ボタン
                card.innerHTML = `
                    <div class="flex-1 pr-3" onclick="toggleBlur(${originalIndex})">
                        <div class="flex items-center gap-1">
                            <p class="text-base font-bold text-slate-900">${item.word}</p>
                            ${(currentMode === 'ebbinghaus' && item.masteredAt) ? '<span class="text-[8px] bg-amber-100 text-amber-700 px-1 rounded">3日後復習</span>' : ''}
                        </div>
                        <p id="meaning-${originalIndex}" class="text-indigo-600 text-sm font-medium mt-1 blur-fix transition-all pointer-events-none">${item.meaning}</p>
                        <div class="flex gap-4 mt-2">
                            <button onclick="event.stopPropagation(); editWord(${originalIndex})" class="text-[10px] text-slate-400">✏️ 編集</button>
                            <button onclick="event.stopPropagation(); deleteWord(${originalIndex})" class="text-[10px] text-red-300">🗑️ 削除</button>
                        </div>
                    </div>
                    <div class="flex-shrink-0 ml-auto pl-2">${actionBtn}</div>
                `;
                listElement.appendChild(card);
            });
        }

        function addWord() {
            const w = document.getElementById('wordInput');
            const m = document.getElementById('meaningInput');
            if (!w.value.trim() || !m.value.trim()) return alert("入力してください");
            words.unshift({ word: w.value.trim(), meaning: m.value.trim(), status: 'learning', masteredAt: null });
            w.value = ''; m.value = '';
            save(); renderWords();
        }

        function updateStatus(index, status) {
            words[index].status = status;
            words[index].masteredAt = (status === 'mastered') ? Date.now() : null;
            save(); renderWords();
        }

        function toggleBlur(index) {
            const el = document.getElementById(`meaning-${index}`);
            if(el) el.classList.toggle('blur-fix');
        }

        function deleteWord(index) {
            if(confirm("削除しますか？")) { words.splice(index, 1); save(); renderWords(); }
        }

        function editWord(index) {
            const w = prompt("英単語", words[index].word);
            const m = prompt("意味", words[index].meaning);
            if (w && m) { words[index].word = w; words[index].meaning = m; save(); renderWords(); }
        }

        // 🎨 タブ切り替え時の白光（ハイライト）処理
        function switchTab(tab) { 
            currentTab = tab; 
            const tl = document.getElementById('tabLearning');
            const tm = document.getElementById('tabMastered');
            
            if(tab === 'learning') {
                tl.className = "w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all bg-white text-slate-800 shadow-sm";
                tm.className = "w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all text-slate-500 bg-transparent";
            } else {
                tl.className = "w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all text-slate-500 bg-transparent";
                tm.className = "w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all bg-white text-slate-800 shadow-sm";
            }
            renderWords(); 
        }
        
        function changeMode() { currentMode = document.getElementById('modeSelect').value; renderWords(); }

        function checkEbbinghausEffect() {
            const now = Date.now();
            let changed = false;
            words.forEach(w => {
                if (currentMode === 'ebbinghaus' && w.status === 'mastered' && w.masteredAt && (now - w.masteredAt > 72*3600000)) {
                    w.status = 'learning'; w.masteredAt = null; changed = true;
                }
            });
            if (changed) { save(); renderWords(); }
        }

        // 初期化
        initSidebar();
        setInterval(checkEbbinghausEffect, 60000);
        renderWords();
    </script>
</body>
</html>
