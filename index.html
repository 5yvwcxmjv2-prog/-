<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>文字数カウンター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    textarea {
      width: 95%;
      max-width: 600px;
      height: 200px;
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    #count {
      font-size: 40px;
      margin: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>文字数カウンター</h1>

<textarea id="text" placeholder="ここに入力..."></textarea>

<div id="count">0文字</div>

<button onclick="copyText()">コピー</button>
<button onclick="clearText()">クリア</button>
<button onclick="undoClear()">元に戻す</button>

<script>
  const text = document.getElementById("text");
  const count = document.getElementById("count");

  let lastText = ""; // 直前の状態

  // 初期ロード
  const saved = localStorage.getItem("draft");
  if (saved) {
    text.value = saved;
  }

  updateCount();

  // 入力時
  text.addEventListener("input", () => {
    localStorage.setItem("draft", text.value);
    updateCount();
  });

  function updateCount() {
    count.innerText = text.value.length + "文字";
  }

  function copyText() {
    navigator.clipboard.writeText(text.value);
  }

  function clearText() {
    // 消す前に保存（ここ重要）
    lastText = text.value;


if (!confirm("本当に消しますか？")) return;

    text.value = "";
    localStorage.removeItem("draft");
    updateCount();
  }

  function undoClear() {
    if (lastText) {
      text.value = lastText;
      localStorage.setItem("draft", lastText);
      updateCount();
    }
  }
</script>

</body>
</html>
