<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wordbook Dual Pro Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            line-height: 1.4;
        }
        button, a, input, select, .tappable {
            touch-action: manipulation;
            cursor: pointer;
        }
        button:active, .tappable:active {
            opacity: 0.6;
            transform: scale(0.97);
        }
        .blur-fix { filter: blur(8px); }
        
        .index-sidebar {
            position: fixed;
            right: 2px;
            top: 140px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 24px;
            z-index: 150;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 8px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        /* 再生中のハイライト用アニメーション */
        .playing-highlight {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body id="appBody" class="bg-slate-50 min-h-screen" style="padding-bottom: calc(100px + var(--sab));">

    <header id="appHeader" class="bg-indigo-600 text-white shadow-md sticky top-0 z-[100] transition-colors duration-300" style="padding-top: var(--sat); padding-bottom: 12px;">
        <div class="max-w-md mx-auto text-center pt-4">
            <h1 id="headerTitle" class="text-lg font-bold">マイ単語帳 🚀</h1>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 relative">
        
        <div id="azSidebar" class="index-sidebar hidden"></div>
        
        <div id="sectionWordbook">
            <div class="mb-4">
                <div class="bg-white rounded-xl p-3 shadow-sm border border-slate-100">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">システムモード</label>
                    <select id="modeSelect" onchange="changeMode()" class="w-full bg-slate-100 px-2.5 py-2 rounded-lg font-bold text-slate-700 border-none text-sm focus:ring-2 focus:ring-indigo-500">
                        <option value="normal">🔒 通常モード</option>
                        <option value="ebbinghaus">🧠 忘却曲線(3日後)</option>
                    </select>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-4">
                <div class="flex flex-col gap-3">
                    <div class="flex gap-2">
                        <input type="text" id="wordInput" placeholder="英単語" class="w-1/2 px-3 py-3 text-base rounded-lg border border-slate-200 bg-white text-slate-900 focus:ring-2 focus:ring-indigo-500 appearance-none">
                        <input type="text" id="meaningInput" placeholder="意味" class="w-1/2 px-3 py-3 text-base rounded-lg border border-slate-200 bg-white text-slate-900 focus:ring-2 focus:ring-indigo-500 appearance-none">
                    </div>
                    <button id="addWordBtn" onclick="addWord()" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-sm active:opacity-80 transition-colors duration-300">
                        単語帳に追加する
                    </button>
                </div>
            </div>

            <div class="bg-slate-200 p-1 rounded-xl flex mb-3">
                <button id="tabLearning" onclick="switchTab('learning')" class="w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all bg-white text-indigo-600 shadow-sm">
                    未習得 (<span id="countLearning">0</span>)
                </button>
                <button id="tabMastered" onclick="switchTab('mastered')" class="w-1/2 py-2.5 text-xs font-bold rounded-lg transition-all text-slate-500 bg-transparent">
                    習得済み 🎉 (<span id="countMastered">0</span>)
                </button>
            </div>

            <div class="flex justify-between items-center mb-4 text-[11px] font-bold">
                <div id="dayFilterGroup" class="flex gap-0.5 bg-slate-200 p-0.5 rounded-lg hidden">
                    <button id="filterDayAll" onclick="changeDayFilter('all')" class="px-2 py-1 rounded bg-white text-emerald-600 shadow-sm">すべて</button>
                    <button id="filterDay1" onclick="changeDayFilter(1)" class="px-2 py-1 rounded text-slate-600">1日後</button>
                    <button id="filterDay2" onclick="changeDayFilter(2)" class="px-2 py-1 rounded text-slate-600">2日後</button>
                    <button id="filterDay3" onclick="changeDayFilter(3)" class="px-2 py-1 rounded text-slate-600">3日後</button>
                </div>
                <div class="flex gap-1 ml-auto">
                    <button id="sortNormalBtn" onclick="toggleShuffle(false)" class="px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-600 border border-indigo-100 shadow-sm">
                        ⏱️ 新しい順
                    </button>
                    <button id="sortShuffleBtn" onclick="toggleShuffle(true)" class="px-3 py-1.5 rounded-lg bg-slate-200 text-slate-600">
                        🎲 シャッフル
                    </button>
                </div>
            </div>
        </div>

        <div id="sectionAudioMode" class="hidden">
            <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-4 text-center">
                <p class="text-xs text-slate-400 font-bold mb-2">ハンズフリー連続再生</p>
                <div class="flex justify-center gap-2">
                    <button id="startAudioBtn" onclick="startContinuousPlayback()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl text-sm shadow-md flex items-center gap-2 transition-all">
                        <span>▶️ 自動読み上げスタート</span>
                    </button>
                    <button id="stopAudioBtn" onclick="stopContinuousPlayback()" class="bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl text-sm hidden">
                        ⏱️ ストップ
                    </button>
                </div>
                <p id="audioStatusText" class="text-[11px] text-slate-500 mt-3 font-medium">リスト内の単語を上から順番に自動再生します</p>
            </div>
            <div class="text-xs font-bold text-slate-400 mb-2 px-1">読み上げ対象の単語 (<span id="countAudioList">0</span>)</div>
        </div>

        <div id="sectionDictionary" class="hidden pr-6">
            <div class="bg-amber-50 border border-amber-200 text-amber-800 rounded-xl p-3 text-xs mb-4 text-center font-medium">
                📖 ABC順 辞書モード (右端の文字でジャンプ)
            </div>
        </div>

        <div id="wordList" class="space-y-3 pb-12 pr-6"></div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl z-[200]" style="padding-bottom: var(--sab);">
        <div class="max-w-md mx-auto flex justify-around items-center py-3">
            <button onclick="switchMainMode('wordbook')" id="navWordbook" class="flex flex-col items-center gap-1 text-indigo-600 w-1/3 py-1">
                <span class="text-xl">🚀</span>
                <span class="text-[10px] font-bold">単語帳</span>
            </button>
            <button onclick="switchMainMode('audio')" id="navAudio" class="flex flex-col items-center gap-1 text-slate-400 w-1/3 py-1">
                <span class="text-xl">👂</span>
                <span class="text-[10px] font-bold">読み上げ</span>
            </button>
            <button onclick="switchMainMode('dictionary')" id="navDictionary" class="flex flex-col items-center gap-1 text-slate-400 w-1/3 py-1">
                <span class="text-xl">📖</span>
                <span class="text-[10px] font-bold">ABC辞書</span>
            </button>
        </div>
    </nav>

    <script>
        const STORAGE_KEY = 'myWordbookTrainV1';
        
        let words = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentTab = 'learning';
        let mainMode = 'wordbook';
        let currentMode = 'normal';
        let currentDayFilter = 'all';
        
        let isShuffleMode = false;
        let shuffledIndices = [];

        // 🆕 連続再生用の管理変数
        let isAudioPlaying = false;
        let audioPlayIndex = 0;
        let audioTimeoutId = null;
        let currentDisplayObjects = []; // 画面に表示されている要素の参照用

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(words)); }

        function speakWord(englishText, japaneseText, callback) {
            window.speechSynthesis.cancel();

            const englishUtterance = new SpeechSynthesisUtterance(englishText);
            englishUtterance.lang = 'en-US';
            englishUtterance.rate = 0.9;

            const japaneseUtterance = new SpeechSynthesisUtterance(japaneseText);
            japaneseUtterance.lang = 'ja-JP';
            japaneseUtterance.rate = 1.0;

            englishUtterance.onend = () => {
                if (!isAudioPlaying && !callback) return; // 単発再生の時は即終了
                
                audioTimeoutId = setTimeout(() => {
                    japaneseUtterance.onend = () => {
                        if (callback) callback(); // 連続再生用の次ステップへ
                    };
                    window.speechSynthesis.speak(japaneseUtterance);
                }, 1000); // 英語と日本語の間の「間」
            };

            window.speechSynthesis.speak(englishUtterance);
        }

        // 🆕 連続自動再生スタート
        function startContinuousPlayback() {
            const audioWords = words.filter(w => w.inAudioMode === true);
            if (audioWords.length === 0) {
                alert("読み上げモードに追加された単語がありません。単語カードの「読み上げ追加」ボタンを押して登録してください。");
                return;
            }

            isAudioPlaying = true;
            audioPlayIndex = 0;
            document.getElementById('startAudioBtn').classList.add('hidden');
            document.getElementById('stopAudioBtn').classList.remove('hidden');
            
            playNextAudioItem();
        }

        // 🆕 次の単語を再生するループ処理
        function playNextAudioItem() {
            if (!isAudioPlaying) return;

            // 再生する対象（現在の表示リスト＝読み上げ登録された単語）
            if (audioPlayIndex >= currentDisplayObjects.length) {
                // すべて読み終わったら終了
                stopContinuousPlayback();
                document.getElementById('audioStatusText').innerText = "🎉 すべての単語の読み上げが完了しました！";
                return;
            }

            // 全単語のハイライトをいったん消去
            const cards = document.querySelectorAll('.tappable');
            cards.forEach(c => c.classList.remove('playing-highlight'));

            // 現在再生中のカードをハイライト
            const currentCard = document.getElementById(`card-${audioPlayIndex}`);
            if (currentCard) {
                currentCard.classList.add('playing-highlight');
                currentCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const obj = currentDisplayObjects[audioPlayIndex];
            document.getElementById('audioStatusText').innerText = `🎵 再生中 (${audioPlayIndex + 1}/${currentDisplayObjects.length}): ${obj.item.word}`;

            speakWord(obj.item.word, obj.item.meaning, () => {
                // 日本語を話し終わった後の「間」をあけて次の単語へ
                audioTimeoutId = setTimeout(() => {
                    audioPlayIndex++;
                    playNextAudioItem();
                }, 1500); // 次の単語へ行くまでの秒数（1.5秒）
            });
        }

        // 🆕 連続自動再生ストップ
        function stopContinuousPlayback() {
            isAudioPlaying = false;
            window.speechSynthesis.cancel();
            clearTimeout(audioTimeoutId);
            
            document.getElementById('startAudioBtn').classList.remove('hidden');
            document.getElementById('stopAudioBtn').classList.add('hidden');
            document.getElementById('audioStatusText').innerText = "読み上げを停止しました。";
            
            // ハイライトを消去
            const cards = document.querySelectorAll('.tappable');
            cards.forEach(c => c.classList.remove('playing-highlight'));
        }

        // 🆕 読み上げモードへの登録・解除の切り替え
        function toggleAudioMode(originalIndex) {
            if (words[originalIndex].inAudioMode) {
                words[originalIndex].inAudioMode = false;
            } else {
                words[originalIndex].inAudioMode = true;
            }
            save();
            renderWords();
        }

        function initSidebar() {
            const sidebar = document.getElementById('azSidebar');
            sidebar.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.className = "text-[9px] font-bold text-slate-400 block w-full text-center py-0.5";
                btn.innerText = letter;
                btn.onclick = () => scrollToLetter(letter);
                sidebar.appendChild(btn);
            }
        }

        function scrollToLetter(letter) {
            const target = document.getElementById(`heading-${letter.toLowerCase()}`);
            if (target) {
                const headerOffset = 70;
                const elementPosition = target.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
        }

        function switchMainMode(mode) {
            // モード切り替え時は自動読み上げを安全に止める
            if (isAudioPlaying && mode !== 'audio') {
                stopContinuousPlayback();
            }

            mainMode = mode;
            document.getElementById('sectionWordbook').classList.toggle('hidden', mode !== 'wordbook');
            document.getElementById('sectionAudioMode').classList.toggle('hidden', mode !== 'audio');
            document.getElementById('sectionDictionary').classList.toggle('hidden', mode !== 'dictionary');
            document.getElementById('azSidebar').classList.toggle('hidden', mode !== 'dictionary');
            
            let themeColor = 'text-indigo-600';
            if (currentMode === 'ebbinghaus') themeColor = 'text-emerald-600';
            if (mode === 'audio') themeColor = 'text-blue-600'; // 読み上げモードの時は青テーマ
            
            document.getElementById('navWordbook').className = `flex flex-col items-center gap-1 w-1/3 py-1 ${mode === 'wordbook' ? themeColor : 'text-slate-400'}`;
            document.getElementById('navAudio').className = `flex flex-col items-center gap-1 w-1/3 py-1 ${mode === 'audio' ? themeColor : 'text-slate-400'}`;
            document.getElementById('navDictionary').className = `flex flex-col items-center gap-1 w-1/3 py-1 ${mode === 'dictionary' ? themeColor : 'text-slate-400'}`;
            
            if (mode === 'wordbook') {
                document.getElementById('headerTitle').innerText = "マイ単語帳 🚀";
            } else if (mode === 'audio') {
                document.getElementById('headerTitle').innerText = "連続聴き流しモード 👂";
            } else {
                document.getElementById('headerTitle').innerText = currentMode === 'ebbinghaus' ? "ABC順 辞書モード 🧠" : "ABC順 辞書モード 📖";
            }
            updateFilterBarVisibility();
            renderWords();
        }

        function toggleShuffle(enable) {
            isShuffleMode = enable;
            const normBtn = document.getElementById('sortNormalBtn');
            const shufBtn = document.getElementById('sortShuffleBtn');
            const themeBg = currentMode === 'ebbinghaus' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-indigo-50 text-indigo-600 border-indigo-100';

            if (isShuffleMode) {
                normBtn.className = "px-3 py-1.5 rounded-lg bg-slate-200 text-slate-600";
                shufBtn.className = `px-3 py-1.5 rounded-lg ${themeBg} border shadow-sm`;
                shuffledIndices = words.map((_, i) => i);
                for (let i = shuffledIndices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledIndices[i], shuffledIndices[j]] = [shuffledIndices[j], shuffledIndices[i]];
                }
            } else {
                normBtn.className = `px-3 py-1.5 rounded-lg ${themeBg} border shadow-sm`;
                shufBtn.className = "px-3 py-1.5 rounded-lg bg-slate-200 text-slate-600";
            }
            renderWords();
        }

        function getRemainingDays(masteredAt) {
            if (!masteredAt) return 0;
            const now = Date.now();
            const elapsedMs = now - masteredAt;
            const threeDaysMs = 72 * 60 * 60 * 1000;
            const remainingMs = threeDaysMs - elapsedMs;
            return Math.ceil(remainingMs / (24 * 60 * 60 * 1000));
        }

        function getCountdownBadge(masteredAt) {
            const remainingDays = getRemainingDays(masteredAt);

            if (remainingDays >= 3) {
                return `<span class="text-[9px] bg-emerald-50 text-emerald-600 border border-emerald-200 px-1.5 py-0.5 rounded ml-1.5 font-bold">3日後復習</span>`;
            } else if (remainingDays === 2) {
                return `<span class="text-[9px] bg-amber-50 text-amber-600 border border-amber-200 px-1.5 py-0.5 rounded ml-1.5 font-bold">2日後復習</span>`;
            } else if (remainingDays === 1) {
                return `<span class="text-[9px] bg-red-50 text-red-500 border border-red-200 px-1.5 py-0.5 rounded ml-1.5 font-bold">1日後復習</span>`;
            } else {
                return `<span class="text-[9px] bg-red-600 text-white px-1.5 py-0.5 rounded ml-1.5 font-bold animate-pulse">今日復習！</span>`;
            }
        }

        function changeDayFilter(day) {
            currentDayFilter = day;
            const btnAll = document.getElementById('filterDayAll');
            const btn1 = document.getElementById('filterDay1');
            const btn2 = document.getElementById('filterDay2');
            const btn3 = document.getElementById('filterDay3');

            [btnAll, btn1, btn2, btn3].forEach(b => b.className = "px-2 py-1 rounded text-slate-600");

            if (day === 'all') btnAll.className = "px-2 py-1 rounded bg-white text-emerald-600 shadow-sm";
            if (day === 1) btn1.className = "px-2 py-1 rounded bg-white text-emerald-600 shadow-sm";
            if (day === 2) btn2.className = "px-2 py-1 rounded bg-white text-emerald-600 shadow-sm";
            if (day === 3) btn3.className = "px-2 py-1 rounded bg-white text-emerald-600 shadow-sm";

            renderWords();
        }

        function updateFilterBarVisibility() {
            const filterBar = document.getElementById('dayFilterGroup');
            if (mainMode === 'wordbook' && currentMode === 'ebbinghaus' && currentTab === 'mastered') {
                filterBar.classList.remove('hidden');
            } else {
                filterBar.classList.add('hidden');
            }
        }

        function renderWords() {
            const listElement = document.getElementById('wordList');
            const learningWords = words.filter(w => w.status === 'learning');
            const masteredWords = words.filter(w => w.status === 'mastered');
            const audioWords = words.filter(w => w.inAudioMode === true);
            
            document.getElementById('countLearning').innerText = learningWords.length;
            document.getElementById('countMastered').innerText = masteredWords.length;
            document.getElementById('countAudioList').innerText = audioWords.length;

            listElement.innerHTML = '';
            let baseWords = [];

            if (mainMode === 'wordbook' && isShuffleMode) {
                baseWords = shuffledIndices.map(idx => ({ item: words[idx], originalIndex: idx }));
            } else {
                baseWords = words.map((w, idx) => ({ item: w, originalIndex: idx }));
            }

            // 画面のモードによってリストの出し分け
            if (mainMode === 'wordbook') {
                currentDisplayObjects = baseWords.filter(obj => obj.item.status === currentTab);
                if (currentMode === 'ebbinghaus' && currentTab === 'mastered' && currentDayFilter !== 'all') {
                    currentDisplayObjects = currentDisplayObjects.filter(obj => {
                        const rem = getRemainingDays(obj.item.masteredAt);
                        if (currentDayFilter === 1) return rem <= 1;
                        return rem === currentDayFilter;
                    });
                }
            } else if (mainMode === 'audio') {
                // 🆕 読み上げモード画面の時は、登録された単語だけを出す
                currentDisplayObjects = baseWords.filter(obj => obj.item.inAudioMode === true);
            } else {
                currentDisplayObjects = [...baseWords].sort((a, b) => a.item.word.toLowerCase().localeCompare(b.item.word.toLowerCase()));
            }

            if (currentDisplayObjects.length === 0) {
                listElement.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">データがありません</div>`;
                return;
            }

            let lastLetter = "";
            let textThemeColor = currentMode === 'ebbinghaus' ? 'text-emerald-600' : 'text-indigo-600';
            let borderThemeColor = currentMode === 'ebbinghaus' ? 'border-emerald-100' : 'border-indigo-100';
            let speakerBgColor = currentMode === 'ebbinghaus' ? 'bg-emerald-50 text-emerald-600' : 'bg-indigo-50 text-indigo-600';

            if (mainMode === 'audio') {
                textThemeColor = 'text-blue-600';
                borderThemeColor = 'border-blue-100';
                speakerBgColor = 'bg-blue-50 text-blue-600';
            }

            currentDisplayObjects.forEach((obj, localIndex) => {
                const item = obj.item;
                const originalIndex = obj.originalIndex;
                
                if (mainMode === 'dictionary') {
                    const firstLetter = item.word.charAt(0).toLowerCase();
                    if (firstLetter !== lastLetter && /[a-z]/.test(firstLetter)) {
                        lastLetter = firstLetter;
                        const heading = document.createElement('div');
                        heading.id = `heading-${firstLetter}`;
                        heading.className = `text-xs font-bold ${textThemeColor} pt-3 pb-1 border-b ${borderThemeColor} uppercase tracking-wider`;
                        heading.innerText = firstLetter;
                        listElement.appendChild(heading);
                    }
                }

                const card = document.createElement('div');
                card.id = `card-${localIndex}`; // 連続再生中のハイライト制御用にIDを付与
                card.className = "bg-white rounded-xl p-4 shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 tappable";
                
                let actionBtn = "";
                if (mainMode === 'wordbook') {
                    actionBtn = item.status === 'learning' 
                        ? `<button onclick="updateStatus(${originalIndex}, 'mastered')" class="bg-emerald-50 text-emerald-600 border border-emerald-100/50 font-bold py-3 px-4 rounded-xl text-xs whitespace-nowrap min-w-[70px]">✓ 覚えた</button>`
                        : `<button onclick="updateStatus(${originalIndex}, 'learning')" class="bg-slate-100 text-slate-600 font-medium py-2 px-3 text-[10px] rounded-lg whitespace-nowrap">戻す</button>`;
                } else if (mainMode === 'audio') {
                    // 読み上げ画面での右側ボタン
                    actionBtn = `<span class="text-[9px] font-bold px-2 py-1 rounded whitespace-nowrap ${item.status === 'learning' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'}">${item.status === 'learning' ? '未習得' : '習得済'}</span>`;
                } else {
                    actionBtn = `<span class="text-[9px] font-bold px-2 py-1 rounded whitespace-nowrap ${item.status === 'learning' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'}">${item.status === 'learning' ? '未習得' : '習得済'}</span>`;
                }

                let timeBadge = "";
                if (currentMode === 'ebbinghaus' && item.status === 'mastered') {
                    timeBadge = getCountdownBadge(item.masteredAt);
                }

                const safeWord = item.word.replace(/'/g, "\\'");
                const safeMeaning = item.meaning.replace(/'/g, "\\'");

                // 🆕 読み上げモードに登録されているかでボタンのデザインを変える
                const audioBtnText = item.inAudioMode ? "➖ 読み上げ解除" : "➕ 読み上げ追加";
                const audioBtnClass = item.inAudioMode ? "text-blue-500 font-semibold" : "text-slate-400";

                // 読み上げモード画面の時は、モザイク（ぼかし）を自動解除して見やすくする
                const blurClass = mainMode === 'audio' ? '' : 'blur-fix';

                card.innerHTML = `
                    <div class="flex-1 pr-3" onclick="toggleBlur(${originalIndex})">
                        <div class="flex items-center gap-2">
                            <p class="text-base font-bold text-slate-900">${item.word}</p>
                            <button onclick="event.stopPropagation(); speakWord('${safeWord}', '${safeMeaning}')" class="${speakerBgColor} p-1.5 rounded-lg text-xs font-bold flex items-center justify-center shadow-sm active:scale-90 transition-transform" title="音声を再生">
                                📢
                            </button>
                            ${timeBadge}
                        </div>
                        <p id="meaning-${originalIndex}" class="${textThemeColor} text-sm font-medium mt-1 ${blurClass} transition-all pointer-events-none">${item.meaning}</p>
                        <div class="flex gap-4 mt-2">
                            <button onclick="event.stopPropagation(); editWord(${originalIndex})" class="text-[10px] text-slate-400">✏️ 編集</button>
                            <button onclick="event.stopPropagation(); deleteWord(${originalIndex})" class="text-[10px] text-red-300">🗑️ 削除</button>
                            <button onclick="event.stopPropagation(); toggleAudioMode(${originalIndex})" class="text-[10px] ${audioBtnClass}">${audioBtnText}</button>
                        </div>
                    </div>
                    <div class="flex-shrink-0 ml-auto pl-2">${actionBtn}</div>
                `;
                listElement.appendChild(card);
            });
        }

        function addWord() {
            const w = document.getElementById('wordInput');
            const m = document.getElementById('meaningInput');
            if (!w.value.trim() || !m.value.trim()) return alert("入力してください");
            // 新規追加時、inAudioModeフラグもデフォルトfalseで追加
            words.unshift({ word: w.value.trim(), meaning: m.value.trim(), status: 'learning', masteredAt: null, inAudioMode: false });
            w.value = ''; m.value = '';
            save(); 
            if (isShuffleMode) toggleShuffle(true); else renderWords();
        }

        function updateStatus(index, status) {
            words[index].status = status;
            words[index].masteredAt = (status === 'mastered') ? Date.now() : null;
            save(); renderWords();
        }

        function toggleBlur(index) {
            // 読み上げモード画面の時はモザイク解除不要
            if (mainMode === 'audio') return;
            const el = document.getElementById(`meaning-${index}`);
            if(el) el.classList.toggle('blur-fix');
        }

        function deleteWord(index) {
            if(confirm("削除しますか？")) { 
                words.splice(index, 1); 
                save(); 
                if (isShuffleMode) toggleShuffle(true); else renderWords();
            }
