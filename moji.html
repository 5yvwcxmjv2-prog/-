<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>文字数カウンター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    textarea {
      width: 90%;
      max-width: 600px;
      height: 200px;
      font-size: 18px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    #count {
      font-size: 40px;
      margin: 20px;
    }

    .sub {
      font-size: 16px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<h1>文字数カウンター</h1>

<textarea id="text" placeholder="ここに入力..."></textarea>

<div id="count">0</div>
<div class="sub" id="detail"></div>

<script>
  const text = document.getElementById("text");
  const count = document.getElementById("count");
  const detail = document.getElementById("detail");

  text.addEventListener("input", () => {
    const value = text.value;

    // 全文字数
    const total = value.length;

    // 空白なし
    const noSpace = value.replace(/\s/g, "").length;

    // 行数
    const lines = value.split("\n").length;

    count.innerText = total;
    detail.innerText = `空白なし: ${noSpace} ｜ 行数: ${lines}`;
  });
</script>

</body>
</html>
